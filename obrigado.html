<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obrigado | PIXT</title>
    <meta name="robots" content="noindex">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Work+Sans:wght@300;400;500;600&family=Syncopate:wght@700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#c6f432',
                            hover: '#a8d422',
                            dark: '#85a815',
                        }
                    },
                    fontFamily: {
                        display: ['"Space Grotesk"', 'sans-serif'],
                        sans:    ['"Work Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #c6f432;
            color: #111827;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .stripe-bg {
            background-color: #c6f432;
        }

        /* Animação de entrada */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-up {
            opacity: 0;
            animation: fadeUp 0.9s ease-out forwards;
        }
        .delay-1 { animation-delay: 0.15s; }
        .delay-2 { animation-delay: 0.35s; }
        .delay-3 { animation-delay: 0.55s; }
        .delay-4 { animation-delay: 0.75s; }

        /* Check animado */
        @keyframes drawCheck {
            from { stroke-dashoffset: 60; }
            to   { stroke-dashoffset: 0; }
        }
        .check-path {
            stroke-dasharray: 60;
            stroke-dashoffset: 60;
            animation: drawCheck 0.7s ease-out 0.3s forwards;
        }

        /* Partículas flutuantes */
        @keyframes floatUp {
            0%   { transform: translateY(0) scale(1); opacity: 0.7; }
            100% { transform: translateY(-120px) scale(0.5); opacity: 0; }
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: #c6f432;
            filter: blur(3px);
            animation: floatUp linear infinite;
            pointer-events: none;
        }

        ::selection { background: #c6f432; color: #0b1a00; }
    </style>
</head>
<body class="stripe-bg relative min-h-screen flex flex-col">

    <!-- Linhas de fundo (igual à Jornada PIXT) -->
    <svg class="absolute top-[-25%] left-0 w-full h-[150%] text-black opacity-[0.06] pointer-events-none z-0 select-none" style="transform:scaleY(-1) scaleX(-1);" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        <path d="M -100 200 C 200 400 300 -50 500 200 S 700 600 1000 400" stroke="currentColor" stroke-width="80" fill="none" stroke-linecap="round"/>
        <path d="M -50 600 C 250 800 450 300 700 600 S 900 900 1100 700" stroke="currentColor" stroke-width="120" fill="none" stroke-linecap="round"/>
    </svg>

    <!-- Navbar mínima -->
    <nav class="relative z-10 w-full px-6 pt-6 flex items-center justify-between max-w-6xl mx-auto">
        <a href="index.html">
            <img src="pxtlogo3.png" alt="PIXT" class="h-10 object-contain"
                 onerror="this.onerror=null;this.src='https://via.placeholder.com/120x40?text=PIXT';">
        </a>
        <a href="index.html"
           class="text-xs font-bold text-black/50 hover:text-black uppercase tracking-widest transition-colors">
            ← Voltar ao site
        </a>
    </nav>

    <!-- Conteúdo principal -->
    <main class="relative z-10 flex-1 flex items-center justify-center px-6 py-16">
        <div class="max-w-2xl mx-auto text-center">

            <!-- Ícone de check -->
            <div class="fade-up mx-auto mb-8 w-20 h-20 rounded-full bg-black/10 border border-black/20 flex items-center justify-center shadow-[0_0_40px_rgba(0,0,0,0.1)]">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none"
                     stroke="black" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path class="check-path" d="M4 13l5 5L20 6"/>
                </svg>
            </div>

            <!-- Badge -->
            <div class="fade-up delay-1 inline-flex items-center gap-2 px-4 py-2 rounded-full border border-black/20 bg-black/08 mb-6">
                <span class="w-2 h-2 rounded-full bg-black/60"></span>
                <span class="text-black/70 text-xs font-bold uppercase tracking-widest">Inscrição Confirmada</span>
            </div>

            <!-- Headline -->
            <h1 class="fade-up delay-2 font-display font-black text-4xl sm:text-5xl md:text-6xl leading-[1.1] text-black mb-6">
                Obrigado por<br>
                se inscrever.
            </h1>

            <!-- Subheadline principal -->
            <p class="fade-up delay-2 text-black/70 text-lg sm:text-xl font-medium leading-relaxed max-w-lg mx-auto mb-3">
                Um especialista entrará em contato o quanto antes.
            </p>

            <!-- Divider -->
            <div class="fade-up delay-3 w-16 h-px bg-black/25 mx-auto my-8"></div>

            <!-- Subheadline secundária -->
            <p class="fade-up delay-3 text-black/55 text-base sm:text-lg font-medium max-w-md mx-auto mb-10">
                Enquanto isso, conheça mais um pouco sobre a Pixt e como trabalhamos.
            </p>

            <!-- Botões -->
            <div class="fade-up delay-4 flex flex-col sm:flex-row gap-4 justify-center">
                <a href="https://www.instagram.com/pixt.ia"
                   target="_blank" rel="noopener noreferrer"
                   class="group flex items-center justify-center gap-3 px-8 py-4 rounded-full bg-black text-[#c6f432] font-bold text-base hover:bg-gray-900 transition-all shadow-[0_12px_28px_rgba(0,0,0,0.25)] hover:-translate-y-0.5">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8"
                         stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
                        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
                    </svg>
                    Acessar Instagram
                </a>

                <a href="https://www.linkedin.com/company/pixt-ia"
                   target="_blank" rel="noopener noreferrer"
                   class="group flex items-center justify-center gap-3 px-8 py-4 rounded-full border-2 border-black/40 text-black font-bold text-base hover:border-black hover:bg-black/10 transition-all hover:-translate-y-0.5">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8"
                         stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                        <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
                        <rect x="2" y="9" width="4" height="12"/>
                        <circle cx="4" cy="4" r="2"/>
                    </svg>
                    Acessar LinkedIn
                </a>
            </div>

        </div>
    </main>

    <!-- Footer mínimo -->
    <footer class="relative z-10 py-8 text-center">
        <p class="text-black/35 text-xs font-medium">© 2026 PIXT. Todos os direitos reservados.</p>
    </footer>

</body>
</html>
